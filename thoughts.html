<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thoughts | Matthew Shirley</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Syne+Mono&family=Instrument+Serif:ital@1&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #060d0f; --gold: #e8a020; --gold-light: #f5c040; --gold-dark: #c97010;
    --text: #e8e0d0; --muted: #8a8070;
  }
  html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; overflow-x: hidden; }
  #stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

  nav { position: relative; z-index: 10; display: flex; align-items: center; justify-content: space-between; padding: 1.5rem 2.5rem; border-bottom: 1px solid rgba(232,160,32,0.15); background: rgba(6,13,15,0.85); backdrop-filter: blur(12px); }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1.2rem; letter-spacing: 0.04em; background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }
  .nav-back { font-family: 'Syne Mono', monospace; font-size: 0.78rem; color: var(--muted); text-decoration: none; letter-spacing: 0.08em; text-transform: uppercase; display: flex; align-items: center; gap: 0.5rem; transition: color 0.2s; }
  .nav-back:hover { color: var(--gold-light); }
  .nav-back::before { content: "←"; }

  .hero { position: relative; z-index: 5; min-height: calc(100vh - 73px); display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 4rem 2rem; }
  .page-eyebrow { font-family: 'Syne Mono', monospace; font-size: 0.72rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
  .page-title { font-family: 'Syne', sans-serif; font-weight: 800; font-size: clamp(3rem, 8vw, 6rem); background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1.05; margin-bottom: 1.5rem; letter-spacing: -0.03em; }
  .page-sub { font-family: 'Instrument Serif', serif; font-style: italic; font-size: clamp(1rem, 2vw, 1.3rem); color: var(--muted); max-width: 520px; line-height: 1.7; margin-bottom: 2.5rem; }
  .gold-rule { width: 60px; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 0 auto 2.5rem; }

  .coming-wrap { display: flex; flex-direction: column; align-items: center; gap: 1.2rem; }
  .coming-badge { font-family: 'Syne Mono', monospace; font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); border: 1px solid rgba(232,160,32,0.3); padding: 0.45rem 1.2rem; border-radius: 2px; }
  .coming-text { font-family: 'Syne Mono', monospace; font-size: 0.78rem; color: var(--muted); letter-spacing: 0.08em; }

  .back-link { margin-top: 3rem; font-family: 'Syne Mono', monospace; font-size: 0.72rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); text-decoration: none; border: 1px solid rgba(232,160,32,0.3); padding: 0.6rem 1.4rem; border-radius: 2px; transition: background 0.2s, border-color 0.2s; }
  .back-link:hover { background: rgba(232,160,32,0.08); border-color: var(--gold); }

  footer { position: relative; z-index: 5; text-align: center; padding: 2rem; border-top: 1px solid rgba(232,160,32,0.1); font-family: 'Syne Mono', monospace; font-size: 0.65rem; letter-spacing: 0.12em; color: var(--muted); }
  footer span { color: var(--gold); }
</style>
</head>
<body>
<canvas id="stars"></canvas>
<nav>
  <a href="index.html" class="nav-logo">SHIRLEYRE</a>
  <a href="index.html" class="nav-back">Home</a>
</nav>
<main class="hero">
  <p class="page-eyebrow">Newsletter · Market Notes · Observations</p>
  <h1 class="page-title">Thoughts</h1>
  <p class="page-sub">Commercial real estate from the ground level — what's moving, what's not, and what it means.</p>
  <div class="gold-rule"></div>
  <div class="coming-wrap">
    <span class="coming-badge">Coming Soon</span>
    <p class="coming-text">First edition coming soon.</p>
  </div>
  <a href="index.html" class="back-link">← Back to Home</a>
</main>
<footer>
  <span>SHIRLEYRE.COM</span> · Built with Claude | Anthropic · © 2026 Matthew Shirley
</footer>
<script>
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize(); window.addEventListener('resize', resize);
function initStars() {
  stars = [];
  const count = Math.floor((canvas.width * canvas.height) / 6000);
  for (let i = 0; i < count; i++) {
    stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2+0.2, alpha: Math.random(), speed: Math.random()*0.008+0.002, phase: Math.random()*Math.PI*2 });
  }
}
initStars();
function drawStars(t) {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for (const s of stars) {
    const a = 0.15+0.7*(0.5+0.5*Math.sin(t*s.speed+s.phase));
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx.fillStyle = `rgba(224,176,96,${a.toFixed(3)})`; ctx.fill();
  }
  requestAnimationFrame(drawStars);
}
requestAnimationFrame(drawStars);
</script>
</body>
</html>
