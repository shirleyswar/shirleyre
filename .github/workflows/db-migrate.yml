name: Run Supabase Migration
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm migration'
        required: true
        default: 'no'

jobs:
  migrate:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install psql
        run: sudo apt-get install -y postgresql-client
      
      - name: Run Migration
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          echo "Running Supabase migration..."
          psql "$SUPABASE_DB_URL" -f supabase/migration.sql
          echo "Migration complete!"
          
      - name: Verify Tables
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$SUPABASE_DB_URL" -c "\dt public.*" -c "SELECT tablename FROM pg_tables WHERE schemaname='public' ORDER BY tablename;"
